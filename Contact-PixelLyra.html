<!DOCTYPE html>

<html class="dark" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PIXELLYRA - Contact</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            font-feature-settings: 'liga';
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-container": "#1a2121",
                        "on-tertiary-fixed": "#002113",
                        "tertiary": "#60eeb1",
                        "on-tertiary": "#003824",
                        "primary": "#47eaed",
                        "surface-container-low": "#161d1d",
                        "on-primary-fixed": "#002020",
                        "primary-fixed": "#5af8fb",
                        "outline": "#859493",
                        "on-secondary-fixed-variant": "#39485a",
                        "secondary-container": "#39485a",
                        "on-secondary": "#233143",
                        "inverse-surface": "#dde4e3",
                        "background": "#0e1515",
                        "surface-bright": "#333b3a",
                        "secondary-fixed": "#d4e4fa",
                        "inverse-primary": "#00696b",
                        "surface-variant": "#2f3636",
                        "on-background": "#dde4e3",
                        "on-secondary-container": "#a7b6cc",
                        "on-primary": "#003738",
                        "on-secondary-fixed": "#0d1c2d",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#090f0f",
                        "on-primary-container": "#005354",
                        "tertiary-fixed": "#6ffbbe",
                        "on-tertiary-container": "#005539",
                        "secondary": "#b9c8de",
                        "on-primary-fixed-variant": "#004f51",
                        "on-error": "#690005",
                        "outline-variant": "#3b4949",
                        "surface-tint": "#2ddbde",
                        "primary-container": "#00ced1",
                        "surface-container-highest": "#2f3636",
                        "tertiary-container": "#3dd197",
                        "surface-container-high": "#242b2b",
                        "error-container": "#93000a",
                        "secondary-fixed-dim": "#b9c8de",
                        "surface-dim": "#0e1515",
                        "on-surface-variant": "#bac9c9",
                        "surface": "#0e1515",
                        "inverse-on-surface": "#2b3232",
                        "primary-fixed-dim": "#2ddbde",
                        "error": "#ffb4ab",
                        "on-surface": "#dde4e3"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Inter"],
                        "display": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    "fontSize": {}
                },
            },
        }
    </script>
</head>

<body
    class="bg-background text-on-background font-body min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
    <!-- TopNavBar -->
    <header
        class="fixed top-0 w-full z-50 h-[4rem] bg-surface/80 dark:bg-[#0e1515]/80 backdrop-blur-md border-b border-outline-variant/20 shadow-[0_0_15px_rgba(0,206,209,0.1)] font-sans antialiased text-on-surface">
        <div class="flex items-center justify-between px-8 max-w-7xl mx-auto h-full">
            <div class="text-[0.75rem] font-[900] tracking-[0.15em] uppercase text-primary dark:text-[#47eaed]">
                PIXELLYRA</div>
            <nav class="hidden md:flex items-center gap-8">
                <a class="text-on-surface-variant dark:text-[#bac9c9] hover:text-primary dark:hover:text-[#47eaed] transition-all duration-300"
                    href="#">Portfolio</a>
                <a class="text-on-surface-variant dark:text-[#bac9c9] hover:text-primary dark:hover:text-[#47eaed] transition-all duration-300"
                    href="#">Galleries</a>
                <a class="text-on-surface-variant dark:text-[#bac9c9] hover:text-primary dark:hover:text-[#47eaed] transition-all duration-300"
                    href="#">Equipment</a>
                <a class="text-primary dark:text-[#47eaed] font-bold border-b-2 border-primary pb-1 active:scale-95 transition-transform"
                    href="#">Contact</a>
            </nav>
            <div class="flex items-center gap-4">
                <button
                    class="hidden md:flex items-center justify-center text-on-surface hover:text-primary transition-colors">
                    <span class="material-symbols-outlined" data-icon="search">search</span>
                </button>
                <button
                    class="hidden md:flex items-center justify-center text-on-surface hover:text-primary transition-colors">
                    <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
                </button>
                <button
                    class="hidden md:inline-flex bg-primary-container text-on-primary-container px-4 py-2 rounded font-semibold text-sm hover:brightness-110 shadow-[0_0_10px_rgba(0,206,209,0.3)] transition-all">Book
                    Session</button>
            </div>
        </div>
    </header>
    <!-- Main Content -->
    <main
        class="flex-grow pt-[6rem] pb-12 px-8 max-w-7xl mx-auto w-full flex flex-col md:flex-row gap-12 items-start justify-center">
        <!-- Contact Form (Glassmorphism Card) -->
        <div
            class="w-full md:w-2/3 bg-surface-container/50 backdrop-blur-lg border border-primary/10 rounded-xl p-8 shadow-2xl relative overflow-hidden">
            <!-- Subtle glow effect behind form -->
            <div
                class="absolute -top-24 -left-24 w-48 h-48 bg-primary/20 rounded-full blur-[100px] pointer-events-none">
            </div>
            <div class="mb-8 relative z-10">
                <h1 class="text-2xl font-bold tracking-tight text-on-surface mb-2">Get in Touch</h1>
                <p class="text-on-surface-variant text-sm">Send us a message and we'll respond as soon as possible.</p>
            </div>
            <form class="space-y-6 relative z-10">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-semibold tracking-wider uppercase text-on-surface-variant"
                            for="nom">Nom</label>
                        <input
                            class="w-full bg-surface-container-highest border border-outline-variant/50 rounded px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-on-surface-variant/30"
                            id="nom" placeholder="Votre nom" type="text" />
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-semibold tracking-wider uppercase text-on-surface-variant"
                            for="courriel">Courriel</label>
                        <input
                            class="w-full bg-surface-container-highest border border-outline-variant/50 rounded px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-on-surface-variant/30"
                            id="courriel" placeholder="votre@email.com" type="email" />
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-semibold tracking-wider uppercase text-on-surface-variant"
                        for="sujet">Sujet</label>
                    <input
                        class="w-full bg-surface-container-highest border border-outline-variant/50 rounded px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-on-surface-variant/30"
                        id="sujet" placeholder="Sujet de votre message" type="text" />
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-semibold tracking-wider uppercase text-on-surface-variant"
                        for="message">Message</label>
                    <textarea
                        class="w-full bg-surface-container-highest border border-outline-variant/50 rounded px-4 py-3 text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder-on-surface-variant/30 resize-none"
                        id="message" placeholder="Comment pouvons-nous vous aider?" rows="5"></textarea>
                </div>
                <button
                    class="w-full bg-primary-container text-on-primary-container font-bold py-3 px-6 rounded flex items-center justify-center gap-2 hover:brightness-110 shadow-[0_0_15px_rgba(0,206,209,0.4)] transition-all active:scale-[0.98]"
                    type="submit">
                    <span>Envoyer</span>
                    <span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
                </button>
            </form>
        </div>
        <!-- Contact Info & Socials -->
        <div class="w-full md:w-1/3 flex flex-col gap-8">
            <div class="bg-surface-container-low border border-outline-variant/30 rounded-lg p-6">
                <h3 class="text-xs font-bold tracking-[0.1em] uppercase text-primary mb-4">Connect</h3>
                <div class="flex flex-col gap-3">
                    <a class="flex items-center gap-3 text-sm text-on-surface-variant hover:text-primary transition-colors bg-surface-container-highest p-3 rounded border border-transparent hover:border-primary/20"
                        href="#">
                        <span class="material-symbols-outlined" data-icon="camera">camera</span>
                        Instagram
                    </a>
                    <a class="flex items-center gap-3 text-sm text-on-surface-variant hover:text-primary transition-colors bg-surface-container-highest p-3 rounded border border-transparent hover:border-primary/20"
                        href="#">
                        <span class="material-symbols-outlined" data-icon="play_circle">play_circle</span>
                        Vimeo
                    </a>
                    <a class="flex items-center gap-3 text-sm text-on-surface-variant hover:text-primary transition-colors bg-surface-container-highest p-3 rounded border border-transparent hover:border-primary/20"
                        href="#">
                        <span class="material-symbols-outlined" data-icon="terminal">terminal</span>
                        Developer API
                    </a>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer -->
    <footer
        class="w-full border-t border-outline-variant/30 py-12 mt-auto bg-surface-container-lowest dark:bg-[#090f0f] text-primary dark:text-[#47eaed] font-sans text-[10px] font-bold uppercase tracking-widest flat no-shadow">
        <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-[0.75rem] font-black tracking-[0.15em] text-primary">PIXELLYRA</div>
            <div class="flex gap-6 flex-wrap justify-center">
                <a class="text-on-surface-variant/60 hover:text-primary dark:hover:text-[#47eaed] transition-colors opacity-80 hover:opacity-100"
                    href="#">Privacy Policy</a>
                <a class="text-on-surface-variant/60 hover:text-primary dark:hover:text-[#47eaed] transition-colors opacity-80 hover:opacity-100"
                    href="#">Terms</a>
                <a class="text-on-surface-variant/60 hover:text-primary dark:hover:text-[#47eaed] transition-colors opacity-80 hover:opacity-100"
                    href="#">Instagram</a>
                <a class="text-on-surface-variant/60 hover:text-primary dark:hover:text-[#47eaed] transition-colors opacity-80 hover:opacity-100"
                    href="#">Vimeo</a>
            </div>
            <div class="text-on-surface-variant/60">
                © 2026 PIXELLYRA. ALL RIGHTS RESERVED.
            </div>
        </div>
    </footer>
</body>

</html>
